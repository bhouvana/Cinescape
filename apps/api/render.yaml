services:
  - type: web
    name: watchblitz-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm ci && npm run build --workspace=@watchblitz/api && npx prisma generate
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: watchblitz-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: watchblitz-redis
          type: redis
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_READ_ACCESS_TOKEN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SENTRY_DSN
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://watchblitz.vercel.app,https://watchblitz.com

databases:
  - name: watchblitz-postgres
    databaseName: watchblitz
    plan: starter
    region: oregon

  - name: watchblitz-redis
    plan: starter
    region: oregon
    ipAllowList: []
