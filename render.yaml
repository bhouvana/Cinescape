databases:
  - name: cinescape-db
    databaseName: cinescape
    user: cinescape
    plan: free
    region: oregon

services:
  - type: redis
    name: cinescape-redis
    plan: free
    region: oregon
    ipAllowList: []

  # ──────────────────────────────────────────────────────────
  # Express API
  # ──────────────────────────────────────────────────────────
  - type: web
    name: cinescape-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev && cd packages/database && npx prisma generate && npx prisma migrate deploy
    startCommand: node node_modules/.bin/tsx apps/api/src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      - key: DATABASE_URL
        fromDatabase:
          name: cinescape-db
          property: connectionString

      - key: REDIS_URL
        fromService:
          name: cinescape-redis
          type: redis
          property: connectionString

      # ── Set these in the Render dashboard ──────────────
      - key: TMDB_API_KEY
        sync: false

      - key: TMDB_READ_ACCESS_TOKEN
        sync: false

      - key: CLERK_SECRET_KEY
        sync: false

      - key: GROQ_API_KEY
        sync: false

      - key: JWT_SECRET
        generateValue: true

      # Allow requests from the web service (set after web is deployed)
      - key: CORS_ORIGINS
        sync: false

  # ──────────────────────────────────────────────────────────
  # Next.js Web Frontend
  # Deploy AFTER the API so you know the API's public URL.
  # Set NEXT_PUBLIC_API_URL = https://cinescape-api.onrender.com
  # ──────────────────────────────────────────────────────────
  - type: web
    name: cinescape-web
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install --include=dev --include=optional && npx turbo build --filter=@watchblitz/web
    startCommand: cd apps/web && ../../node_modules/.bin/next start -p 10000
    envVars:
      - key: NODE_ENV
        value: production

      # ── Set these in the Render dashboard ──────────────
      # Must be the PUBLIC Render URL of cinescape-api:
      #   https://cinescape-api.onrender.com
      - key: NEXT_PUBLIC_API_URL
        sync: false

      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false

      - key: CLERK_SECRET_KEY
        sync: false

      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in

      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up

      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
        value: /

      - key: NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL
        value: /
